# =============================================================================
# HackET — Docker Compose for local dev services (PostgreSQL + Redis)
# Usage:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v  (deletes all data)
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: hacket-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hacket_db
    volumes:
      - hacket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hacket-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hacket_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hacket_pgdata:
  hacket_redis_data:
